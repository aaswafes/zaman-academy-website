<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Zaman Akademiya — Arab tili sertifikatlariga tayyorlov">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090B"/>
      <stop offset="1" stop-color="#27272A"/>
    </linearGradient>
    <radialGradient id="aura1" cx="0.85" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura2" cx="0.1" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#C9A56A" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C9A56A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#aura1)"/>
  <rect width="1200" height="630" fill="url(#aura2)"/>
  <text x="80" y="220" font-family="Instrument Serif,Georgia,serif" font-size="120" fill="#FAFAFA">Zaman</text>
  <text x="80" y="320" font-family="Instrument Serif,Georgia,serif" font-style="italic" font-size="64" fill="#A1A1AA">Akademiya</text>
  <text x="80" y="500" font-family="Inter,system-ui,sans-serif" font-size="34" fill="#E4E4E7">Arab tili. CEFR &amp; at-Tanall. Toshkentda.</text>
  <text x="80" y="550" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#71717A">10–12 oyda B2 yoki C1 — kafolat bilan.</text>
  <text x="1120" y="555" text-anchor="end" font-family="'Noto Naskh Arabic',serif" font-size="80" fill="#EC4899" direction="rtl">زمان</text>
</svg>
